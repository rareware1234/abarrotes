<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Comunicación</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .panel { flex: 1; border: 1px solid #ccc; padding: 10px; }
        button { margin: 5px; padding: 10px; }
        .log { background: #f5f5f5; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Prueba de Comunicación entre Pestañas</h1>
    <p>Abre esta página en dos pestañas diferentes para probar.</p>
    
    <div class="container">
        <div class="panel">
            <h2>Pestaña 1 (Venta)</h2>
            <button onclick="enviarProducto()">Enviar Producto "Leche"</button>
            <button onclick="enviarNuevaVenta()">Enviar Nueva Venta</button>
            <div class="log" id="log1"></div>
        </div>
        <div class="panel">
            <h2>Pestaña 2 (Cliente)</h2>
            <button onclick="leerMensaje()">Leer Mensaje</button>
            <div class="log" id="log2"></div>
        </div>
    </div>

    <script>
        const channelName = 'pantalla_cliente';
        
        function log1(msg) {
            document.getElementById('log1').innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        }
        
        function log2(msg) {
            document.getElementById('log2').innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        }
        
        function enviarProducto() {
            const data = {
                type: 'product_scanned',
                product: { id: 1, nombre: 'Leche', precio: 20.00 },
                timestamp: new Date().toISOString()
            };
            
            // Guardar en localStorage
            localStorage.setItem('cliente_pantalla', JSON.stringify(data));
            log1('Guardado en localStorage: ' + data.type);
            
            // Enviar por BroadcastChannel
            const channel = new BroadcastChannel(channelName);
            channel.postMessage(data);
            channel.close();
            log1('Enviado por BroadcastChannel: ' + data.type);
        }
        
        function enviarNuevaVenta() {
            const data = {
                type: 'nueva_venta',
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('cliente_pantalla', JSON.stringify(data));
            log1('Guardado en localStorage: ' + data.type);
            
            const channel = new BroadcastChannel(channelName);
            channel.postMessage(data);
            channel.close();
            log1('Enviado por BroadcastChannel: ' + data.type);
        }
        
        function leerMensaje() {
            const dataStr = localStorage.getItem('cliente_pantalla');
            if (dataStr) {
                const data = JSON.parse(dataStr);
                log2('Leído de localStorage: ' + data.type);
                // No eliminamos para que el polling lo lea también
            } else {
                log2('No hay mensaje en localStorage');
            }
        }
        
        // Configurar BroadcastChannel
        const channel = new BroadcastChannel(channelName);
        channel.onmessage = (event) => {
            log2('Recibido por BroadcastChannel: ' + event.data.type);
        };
        
        // Polling cada segundo
        setInterval(() => {
            const dataStr = localStorage.getItem('cliente_pantalla');
            if (dataStr) {
                const data = JSON.parse(dataStr);
                log2('Polling detectó: ' + data.type);
            }
        }, 1000);
        
        log1('Listo para enviar mensajes');
        log2('Listo para recibir mensajes');
    </script>
</body>
</html>
