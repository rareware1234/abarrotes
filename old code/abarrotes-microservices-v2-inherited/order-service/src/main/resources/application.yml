spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:orders}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
server:
  port: 8080
